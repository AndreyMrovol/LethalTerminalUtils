[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "mrov"
name = "TerminalUtils"
description = "A terminal utility for Lethal Company, providing dynamic preview options, command registration and more."
websiteUrl = "https://github.com/AndreyMrovol/LethalTerminalUtils"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2100"
mrov-MrovLib = "0.4.10"

[build]
icon = "../icon.png"
readme = "../README.md"
outdir = "../TerminalUtils/dist"

[[build.copy]]
source = "../TerminalUtils/bin/Release/netstandard2.1/TerminalUtils.dll"
target = "/"

[[build.copy]]
source = "../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../LICENSE.md"
target = "/"

[publish]
communities = [ "lethal-company", ]